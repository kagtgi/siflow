# SIFLOW-D: Dream-7B teacher (Qwen vocab ~152k), head-only on Dream's own backbone.
# ~14 GB fp16 fits a single A100-40GB; reduced top-m support keeps the large-vocab
# tensors small. Run in NB2 (notebooks/nb2_large_teachers.ipynb).
defaults: default.yaml
run_id: siflow_dream

teacher:
  kind: dream
  name: Dream-org/Dream-v0-Base-7B
  dtype: bf16
  auto_class: AutoModel        # set to a *ForMaskedLM/ForCausalLM variant if needed
  mask_token: null             # set to the mask token str/id if tokenizer.mask_token_id is unset
  attn_implementation: null

data:
  source: live                 # teacher runs live with reduced top-m support
  seq_len: 256
  tokens_path: runs/data/dream_256.npy
  cache_dir: null
  reduced_m: 128

train:
  batch_size: 16               # 40GB-safe (7B backbone ~14GB + activations + head)
  micro_batch: 4
  total_steps: 8000
  lam_reg: 0.0                  # MDM regulariser is full-vocab only
